<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>N Login Panel</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: #111827;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  color: white;
}
h2 {
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #16a34a;
}
#msg {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>N Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "N" && p === "1234"){
    document.getElementById("msg").innerText = "Welcome N!";
  } else {
    document.getElementById("msg").innerText = "Wrong login!";
  }
}
</script>

</body>
</html>
